name: Check GKD Subscription

on:
  pull_request_target:

jobs:
  check-gkd:
    name: Block GKD Subscription PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check for GKD-related packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check PR title and package.json diff for gkd-related keywords
          GKD_PATTERN='gkd[-_]?(subscription|rules|kit)|gkd_|[-_]gkd|(^|[^a-zA-Z0-9])@?gkd([^a-zA-Z0-9]|$)'

          FOUND=""

          # Check PR title
          if echo "$PR_TITLE" | grep -iEq "$GKD_PATTERN"; then
            FOUND="title"
          fi

          # Only check added lines in package.json (not removals, not docs/workflow files)
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" 2>/dev/null \
            | awk '/^diff --git a\/package\.json/,/^diff --git/' || true)
          if echo "$DIFF" | grep -iEq "^\+[^+].*($GKD_PATTERN)"; then
            FOUND="${FOUND:+$FOUND and }package.json"
          fi

          if [ -n "$FOUND" ]; then
            echo "❌ Detected GKD subscription-related content in: $FOUND"

            # Add comment using heredoc to avoid indentation issues
            cat > /tmp/gkd-comment.md << 'EOF'
          🚫 **此 PR 包含 GKD 订阅规则相关的包，不符合本项目的白名单要求。**

          本项目 **不接受** 任何与 GKD（去广告/跳广告）订阅规则相关的包申请。这类包不是真正的 npm library，而是利用 npmmirror CDN 来分发广告屏蔽订阅规则文件，属于滥用 CDN 资源。

          详情请阅读 [README.md](https://github.com/cnpm/unpkg-white-list/blob/master/README.md) 中的说明。
          EOF

            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/gkd-comment.md

            exit 1
          fi

          echo "✅ No GKD subscription-related content detected."
